# render.yaml
services:
  # ① Webアプリケーションサーバー（ここでワーカーも同時に安全に起動させます）
  - type: web
    name: health-ai-coach-web
    env: ruby
    buildCommand: "./bin/render-build.sh"
    # ⭕ 変更: Puma（Web）の起動と同時に、同じ環境内でバックグラウンドワーカーを並列起動（&）させます
    startCommand: "SOLID_QUEUE_IN_PUMA=true bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: health-ai-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

# ② 本番用 PostgreSQL データベースサーバー
databases:
  - name: health-ai-db
    databaseName: health_ai_coach_production
    user: health_coach_user
    plan: free
