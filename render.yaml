# render.yaml
services:
  # ① Webアプリケーションサーバーのみ（ここでAIアドバイスもinlineで安全に同時処理します）
  - type: web
    name: health-ai-coach-web
    env: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
      - key: DATABASE_URL
        fromDatabase:
          name: health-ai-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

# ② 本番用 PostgreSQL データベースサーバー
databases:
  - name: health-ai-db
    databaseName: health_ai_coach_production
    user: health_coach_user
    plan: free
